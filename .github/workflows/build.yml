# A simple action usage
name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Build Kernel
      uses: dabao1955/kernel_build_action@main
      with:
          kernel-url: https://github.com/ImSpiDy/kernel_xiaomi_lavender
          kernel-dir: lavender
          kernel-branch: 14-Retro
          config: lavender_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: false
          android-version: 14
          aosp-clang-version: r487747c
          python-27: true
          disable-lto: true
          anykernel3: true
          anykernel3-url: https://github.com/ImSpiDy/AnyKernel3
          lxc: true
          lxc-patch: true
